name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# One in-flight run per ref; new pushes cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Determinism knobs applied to every job/step.
env:
  PYTHONHASHSEED: "0"
  MPLBACKEND: "Agg"
  PYTHONPATH: "."
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # ── Verification contract: fast, on every supported interpreter ────────────
  verify:
    name: verify (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install locked environment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Record resolved environment
        run: pip freeze
      - name: Verify (pytest — deprecations & future-warnings are errors)
        run: python -m pytest tests/ -q -W error::DeprecationWarning -W error::FutureWarning

  # ── Pipeline smoke: exercise the full reproduce chain once, end to end ──────
  reproduce-smoke:
    name: reproduce (preview profile)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install locked environment
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Reproduce everything at the preview profile
        run: python scripts/run_all.py preview
      - name: Assert figures and tables were regenerated
        run: |
          n_fig=$(ls paper/figures/*.pdf 2>/dev/null | wc -l)
          n_tab=$(ls paper/tables/*.tex paper/tables/*.csv 2>/dev/null | wc -l)
          echo "figures=$n_fig tables=$n_tab"
          test "$n_fig" -gt 0
          test "$n_tab" -gt 0
      - name: Upload regenerated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-figures-tables
          path: |
            paper/figures/*.pdf
            paper/tables/*
          if-no-files-found: warn
